<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Todo List</title>
  <style>
    :root {
      --panel: #111827;
      --panel-3: #222b3b;
      --line: #303a4d;
      --line-soft: #263043;
      --text: #e8eef8;
      --muted: #9da8ba;
      --blue: #4e8df7;
      --blue-2: #67a5ff;
      --violet: #7c6df4;
      --green: #43d39e;
      --red: #f05b57;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(78, 141, 247, 0.16), transparent 32rem),
        linear-gradient(135deg, #061018, #0b111d 48%, #071a1d);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .todo-app {
      width: min(1380px, 100%);
      min-height: 820px;
      overflow: hidden;
      border: 1px solid rgba(93, 111, 142, 0.28);
      border-radius: 36px;
      background: rgba(17, 24, 39, 0.94);
      box-shadow: var(--shadow);
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 2.5rem 2.65rem 1.6rem;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 1.15rem;
    }

    .app-mark {
      width: 70px;
      height: 70px;
      flex: 0 0 auto;
      border-radius: 22px;
      background: linear-gradient(135deg, #6aa0ff, var(--violet));
      box-shadow: 0 18px 42px rgba(95, 123, 246, 0.28);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 3vw, 2.55rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .byline {
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .clock-pill {
      min-height: 64px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 1.35rem;
      border: 1px solid var(--line);
      border-radius: 24px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.045);
      font-size: 1.35rem;
      white-space: nowrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1.1rem;
      padding: 0 2.65rem 1.85rem;
    }

    .stat-card {
      min-height: 116px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.65rem;
      padding: 1.3rem;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.045);
    }

    .stat-card strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
    }

    .stat-card span {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .task-form {
      display: grid;
      grid-template-columns: minmax(220px, 1.35fr) minmax(170px, 0.9fr) minmax(150px, 0.9fr) auto;
      gap: 0.9rem;
      margin-top: 1.85rem;
      padding: 1.8rem;
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      background: rgba(8, 15, 27, 0.58);
    }

    .task-form input {
      width: 100%;
      min-height: 70px;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 0 1.25rem;
      color: var(--text);
      background: var(--panel-3);
      outline: none;
    }

    .task-form input::placeholder {
      color: #8f9aac;
    }

    .task-form input:focus {
      border-color: rgba(103, 165, 255, 0.78);
      box-shadow: 0 0 0 4px rgba(78, 141, 247, 0.14);
    }

    .primary-btn,
    .ghost-btn,
    .filter-btn,
    .task-action {
      border: 1px solid transparent;
      border-radius: 18px;
      color: var(--text);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .primary-btn {
      min-width: 160px;
      min-height: 68px;
      padding: 0 1.25rem;
      background: linear-gradient(135deg, var(--blue-2), var(--blue));
      font-weight: 800;
      font-size: 1.35rem;
      box-shadow: 0 15px 32px rgba(78, 141, 247, 0.22);
    }

    .primary-btn:hover,
    .ghost-btn:hover,
    .filter-btn:hover,
    .task-action:hover {
      transform: translateY(-1px);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.7rem 2.65rem;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .filter-btn,
    .ghost-btn {
      min-height: 60px;
      padding: 0 1.25rem;
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-size: 1.18rem;
    }

    .filter-btn.active {
      border-color: rgba(103, 165, 255, 0.7);
      background: rgba(78, 141, 247, 0.18);
      color: var(--text);
    }

    .ghost-btn {
      color: var(--text);
    }

    .tasks-panel {
      position: relative;
      margin: 0 2.65rem;
      min-height: 176px;
      border: 1px dashed rgba(157, 168, 186, 0.3);
      border-radius: 24px;
    }

    .task-list {
      display: grid;
      gap: 0.85rem;
      margin: 0;
      padding: 1rem;
      list-style: none;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 1rem;
      min-height: 76px;
      padding: 0.9rem 1rem;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
    }

    .task-check {
      width: 26px;
      height: 26px;
      accent-color: var(--green);
    }

    .task-main {
      min-width: 0;
    }

    .task-title {
      display: block;
      width: fit-content;
      max-width: 100%;
      overflow-wrap: anywhere;
      font-size: 1.12rem;
      font-weight: 750;
    }

    .task-meta {
      display: block;
      margin-top: 0.35rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .task-item.done .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-actions {
      display: flex;
      gap: 0.45rem;
    }

    .task-action {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-color: var(--line-soft);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 1.2rem;
    }

    .task-action.delete:hover {
      border-color: rgba(240, 91, 87, 0.7);
      color: #ffd5d3;
      background: rgba(240, 91, 87, 0.13);
    }

    .empty-state {
      min-height: 174px;
      display: grid;
      place-content: center;
      gap: 0.75rem;
      text-align: center;
      color: var(--muted);
      padding: 2rem;
    }

    .empty-state h2 {
      color: var(--text);
      font-size: 1.45rem;
    }

    .empty-state.hidden {
      display: none;
    }

    .app-footer {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.55rem 2.65rem 2.4rem;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .creator-card {
      width: 230px;
      display: grid;
      grid-template-columns: 72px 1fr;
      align-items: center;
      gap: 0.9rem;
      padding: 0.85rem;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.055);
    }

    .creator-card svg {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      background: #fff;
    }

    .creator-card p {
      color: var(--text);
      font-weight: 800;
      line-height: 1.2;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .app-shell {
        padding: 1rem;
      }

      .todo-app {
        min-height: auto;
        border-radius: 28px;
      }

      .app-header,
      .toolbar,
      .app-footer {
        flex-direction: column;
        align-items: stretch;
      }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .task-form {
        grid-template-columns: 1fr;
      }

      .primary-btn,
      .creator-card {
        width: 100%;
      }
    }

    @media (max-width: 620px) {
      .app-shell {
        padding: 0;
      }

      .todo-app {
        min-height: 100vh;
        border-radius: 0;
      }

      .app-header,
      .stats-grid,
      .toolbar,
      .app-footer {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .app-mark {
        width: 56px;
        height: 56px;
        border-radius: 18px;
      }

      .clock-pill {
        width: 100%;
        justify-content: flex-start;
        font-size: 1rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .task-form {
        margin-top: 1rem;
        padding: 1rem;
      }

      .toolbar {
        align-items: stretch;
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .filter-btn,
      .ghost-btn {
        width: 100%;
        min-height: 54px;
        padding: 0 0.6rem;
        font-size: 1rem;
      }

      .tasks-panel {
        margin: 0 1rem;
      }

      .task-item {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .task-actions {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="todo-app" aria-label="Todo application">
      <header class="app-header">
        <div class="title-wrap">
          <div class="app-mark" aria-hidden="true"></div>
          <div>
            <h1>My Todo List</h1>
            <p class="byline">made by Swastik</p>
          </div>
        </div>
        <time class="clock-pill" id="clockText"></time>
      </header>

      <section class="stats-grid" aria-label="Task summary">
        <article class="stat-card">
          <strong id="totalCount">0</strong>
          <span>Total tasks</span>
        </article>
        <article class="stat-card">
          <strong id="pendingCount">0</strong>
          <span>Pending tasks</span>
        </article>
        <article class="stat-card">
          <strong id="completedCount">0</strong>
          <span>Completed tasks</span>
        </article>
        <article class="stat-card">
          <strong id="dayText">Today</strong>
          <span>Current day</span>
        </article>
      </section>

      <form class="task-form" id="taskForm">
        <label class="sr-only" for="taskTitle">Task title</label>
        <input id="taskTitle" type="text" placeholder="Add a task..." autocomplete="off" maxlength="90">

        <label class="sr-only" for="taskDate">Task date</label>
        <input id="taskDate" type="date">

        <label class="sr-only" for="taskTime">Task time</label>
        <input id="taskTime" type="time">

        <button type="submit" class="primary-btn">Add Task</button>
      </form>

      <div class="toolbar">
        <div class="filters" role="tablist" aria-label="Task filters">
          <button class="filter-btn active" type="button" data-filter="all" role="tab" aria-selected="true">All</button>
          <button class="filter-btn" type="button" data-filter="pending" role="tab" aria-selected="false">Pending</button>
          <button class="filter-btn" type="button" data-filter="completed" role="tab" aria-selected="false">Completed</button>
        </div>
        <button class="ghost-btn" id="clearCompleted" type="button">Clear completed</button>
      </div>

      <section class="tasks-panel" aria-live="polite">
        <ul class="task-list" id="taskList"></ul>
        <div class="empty-state" id="emptyState">
          <h2>No tasks here yet</h2>
          <p>Add your first task using the box above.</p>
        </div>
      </section>

      <footer class="app-footer">
        <span>Tip: press Enter to add a task. Double-click a task title to edit it.</span>
        <aside class="creator-card" aria-label="Creator badge">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="100xdevs logo">
            <rect width="200" height="200" fill="#ffffff"></rect>
            <g font-family="Arial, Helvetica, sans-serif" font-weight="900" letter-spacing="-5">
              <text x="40" y="74" font-size="47" fill="#17181c">100</text>
              <text x="126" y="74" font-size="47" fill="#f04a35">x</text>
              <text x="41" y="121" font-size="47" fill="#17181c">devs</text>
            </g>
          </svg>
          <p>made by Swastik</p>
        </aside>
      </footer>
    </section>
  </main>

  <script>
    const taskForm = document.querySelector("#taskForm");
    const taskTitle = document.querySelector("#taskTitle");
    const taskDate = document.querySelector("#taskDate");
    const taskTime = document.querySelector("#taskTime");
    const taskList = document.querySelector("#taskList");
    const emptyState = document.querySelector("#emptyState");
    const clearCompleted = document.querySelector("#clearCompleted");
    const filterButtons = document.querySelectorAll(".filter-btn");

    const totalCount = document.querySelector("#totalCount");
    const pendingCount = document.querySelector("#pendingCount");
    const completedCount = document.querySelector("#completedCount");
    const dayText = document.querySelector("#dayText");
    const clockText = document.querySelector("#clockText");

    let tasks = loadTasks();
    let activeFilter = "all";

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem("swastikTasks") || "[]");
      } catch {
        return [];
      }
    }

    function createId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function saveTasks() {
      localStorage.setItem("swastikTasks", JSON.stringify(tasks));
    }

    function formatDate(value) {
      if (!value) return "No date";
      const date = new Date(`${value}T00:00:00`);
      return date.toLocaleDateString(undefined, {
        weekday: "short",
        day: "2-digit",
        month: "short"
      });
    }

    function formatTime(value) {
      if (!value) return "No time";
      const [hours, minutes] = value.split(":");
      const date = new Date();
      date.setHours(Number(hours), Number(minutes), 0, 0);
      return date.toLocaleTimeString(undefined, {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function updateClock() {
      const now = new Date();
      clockText.textContent = now.toLocaleString(undefined, {
        weekday: "long",
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
      dayText.textContent = now.toLocaleDateString(undefined, {
        weekday: "short",
        day: "2-digit",
        month: "short"
      });
    }

    function getVisibleTasks() {
      if (activeFilter === "pending") return tasks.filter((task) => !task.done);
      if (activeFilter === "completed") return tasks.filter((task) => task.done);
      return tasks;
    }

    function updateStats() {
      const completed = tasks.filter((task) => task.done).length;
      totalCount.textContent = tasks.length;
      pendingCount.textContent = tasks.length - completed;
      completedCount.textContent = completed;
    }

    function renderTasks() {
      const visibleTasks = getVisibleTasks();
      taskList.innerHTML = "";
      emptyState.classList.toggle("hidden", visibleTasks.length > 0);

      visibleTasks.forEach((task) => {
        const item = document.createElement("li");
        item.className = `task-item${task.done ? " done" : ""}`;
        item.dataset.id = task.id;

        const checkbox = document.createElement("input");
        checkbox.className = "task-check";
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.setAttribute("aria-label", `Mark ${task.title} complete`);

        const main = document.createElement("div");
        main.className = "task-main";

        const title = document.createElement("span");
        title.className = "task-title";
        title.textContent = task.title;
        title.title = "Double-click to edit";

        const meta = document.createElement("span");
        meta.className = "task-meta";
        meta.textContent = `${formatDate(task.date)} at ${formatTime(task.time)}`;

        const actions = document.createElement("div");
        actions.className = "task-actions";

        const editButton = document.createElement("button");
        editButton.className = "task-action edit";
        editButton.type = "button";
        editButton.title = "Edit task";
        editButton.setAttribute("aria-label", `Edit ${task.title}`);
        editButton.textContent = "E";

        const deleteButton = document.createElement("button");
        deleteButton.className = "task-action delete";
        deleteButton.type = "button";
        deleteButton.title = "Delete task";
        deleteButton.setAttribute("aria-label", `Delete ${task.title}`);
        deleteButton.textContent = "X";

        main.append(title, meta);
        actions.append(editButton, deleteButton);
        item.append(checkbox, main, actions);
        taskList.append(item);
      });

      updateStats();
      saveTasks();
    }

    function addTask(event) {
      event.preventDefault();
      const title = taskTitle.value.trim();

      if (!title) {
        taskTitle.focus();
        return;
      }

      tasks.unshift({
        id: createId(),
        title,
        date: taskDate.value,
        time: taskTime.value,
        done: false
      });

      taskForm.reset();
      taskTitle.focus();
      renderTasks();
    }

    function editTask(id) {
      const task = tasks.find((item) => item.id === id);
      if (!task) return;

      const nextTitle = prompt("Edit task", task.title);
      if (!nextTitle || !nextTitle.trim()) return;

      task.title = nextTitle.trim();
      renderTasks();
    }

    taskForm.addEventListener("submit", addTask);

    taskList.addEventListener("click", (event) => {
      const item = event.target.closest(".task-item");
      if (!item) return;

      const id = item.dataset.id;
      const task = tasks.find((entry) => entry.id === id);
      if (!task) return;

      if (event.target.matches(".task-check")) {
        task.done = event.target.checked;
        renderTasks();
      }

      if (event.target.matches(".delete")) {
        tasks = tasks.filter((entry) => entry.id !== id);
        renderTasks();
      }

      if (event.target.matches(".edit")) {
        editTask(id);
      }
    });

    taskList.addEventListener("dblclick", (event) => {
      const item = event.target.closest(".task-item");
      if (!item || !event.target.matches(".task-title")) return;
      editTask(item.dataset.id);
    });

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;

        filterButtons.forEach((item) => {
          const isActive = item === button;
          item.classList.toggle("active", isActive);
          item.setAttribute("aria-selected", String(isActive));
        });

        renderTasks();
      });
    });

    clearCompleted.addEventListener("click", () => {
      tasks = tasks.filter((task) => !task.done);
      renderTasks();
    });

    updateClock();
    setInterval(updateClock, 30000);
    renderTasks();
  </script>
</body>
</html>
