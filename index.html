<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 50% 0%, #1e1e38 0%, #0c0d14 100%);
      --panel-bg: rgba(20, 21, 33, 0.72);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-indigo: #6366f1;
      --accent-purple: #a855f7;
      --accent-cyan: #06b6d4;
      --accent-green: #10b981;
      --accent-danger: #ef4444;
      --gradient-primary: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
      --shadow-glow: 0 12px 40px rgba(99, 102, 241, 0.25);
      --shadow-card: 0 20px 50px rgba(0, 0, 0, 0.4);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      line-height: 1.5;
      overflow-x: hidden;
    }

    button, input {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      width: 100%;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }

    .todo-app {
      width: min(1100px, 100%);
      min-height: 850px;
      display: flex;
      flex-direction: column;
      background: var(--panel-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--panel-border);
      border-radius: 32px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 3rem 3rem 2rem;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .app-mark {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--gradient-primary);
      box-shadow: var(--shadow-glow);
      position: relative;
      flex-shrink: 0;
    }

    .app-mark::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
    }

    h1 {
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(to right, #ffffff, #d1d5db);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .byline {
      margin-top: 0.25rem;
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .clock-pill {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      padding: 0 1.5rem;
      border: 1px solid var(--panel-border);
      border-radius: 100px;
      color: #e5e7eb;
      background: rgba(255, 255, 255, 0.03);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
      white-space: nowrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      padding: 0 3rem 2rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: var(--transition);
    }

    .stat-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .stat-card strong {
      font-size: 2.25rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .stat-card:nth-child(1) strong { color: var(--accent-indigo); }
    .stat-card:nth-child(2) strong { color: var(--accent-cyan); }
    .stat-card:nth-child(3) strong { color: var(--accent-green); }
    .stat-card:nth-child(4) strong {
      color: #ffffff;
      font-size: 1.35rem;
      margin-top: 0.6rem;
    }

    .stat-card span {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .task-form {
      display: grid;
      grid-template-columns: 2.2fr 1fr 1fr auto;
      gap: 1rem;
      padding: 2rem 3rem;
      background: rgba(10, 11, 18, 0.4);
      border-top: 1px solid var(--panel-border);
      border-bottom: 1px solid var(--panel-border);
    }

    .task-form input {
      width: 100%;
      min-height: 56px;
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 0 1.25rem;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.03);
      outline: none;
      transition: var(--transition);
    }

    .task-form input::placeholder {
      color: #6b7280;
    }

    .task-form input:focus {
      border-color: var(--accent-indigo);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
      opacity: 0.6;
      transition: var(--transition);
    }

    input[type="date"]::-webkit-calendar-picker-indicator:hover,
    input[type="time"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }

    .primary-btn {
      min-width: 140px;
      min-height: 56px;
      padding: 0 1.5rem;
      background: var(--gradient-primary);
      font-weight: 700;
      font-size: 1rem;
      border-radius: 14px;
      box-shadow: var(--shadow-glow);
      transition: var(--transition);
    }

    .primary-btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      box-shadow: 0 15px 35px rgba(99, 102, 241, 0.35);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.75rem 3rem;
    }

    .filters {
      display: flex;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.35rem;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
      flex-wrap: wrap;
    }

    .filter-btn {
      min-height: 38px;
      padding: 0 1.25rem;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      transition: var(--transition);
    }

    .filter-btn:hover {
      color: #ffffff;
    }

    .filter-btn.active {
      background: rgba(255, 255, 255, 0.07);
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .ghost-btn {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      border-radius: 10px;
      transition: var(--transition);
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .ghost-btn:hover {
      color: var(--accent-danger);
      border-color: rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.05);
    }

    .tasks-panel {
      position: relative;
      margin: 0 3rem 3rem;
      flex-grow: 1;
      border: 1px dashed var(--panel-border);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.01);
      overflow: hidden;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 1.25rem;
      list-style: none;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 1.25rem;
      padding: 1.1rem 1.5rem;
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      transition: var(--transition);
    }

    .task-item:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateX(2px);
    }

    .task-check {
      width: 22px;
      height: 22px;
      accent-color: var(--accent-green);
      cursor: pointer;
    }

    .task-main {
      min-width: 0;
    }

    .task-title {
      display: block;
      width: fit-content;
      max-width: 100%;
      overflow-wrap: anywhere;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #f3f4f6;
      cursor: pointer;
    }

    .task-meta {
      display: block;
      margin-top: 0.25rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .task-item.done {
      opacity: 0.6;
    }

    .task-item.done .task-title {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .task-actions {
      display: flex;
      gap: 0.5rem;
    }

    .task-action {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-muted);
      transition: var(--transition);
    }

    .task-action svg {
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .task-action.edit:hover {
      border-color: rgba(99, 102, 241, 0.4);
      color: #ffffff;
      background: rgba(99, 102, 241, 0.1);
    }

    .task-action.delete:hover {
      border-color: rgba(239, 68, 68, 0.4);
      color: #ffc7c7;
      background: rgba(239, 68, 68, 0.15);
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
      color: var(--text-muted);
      padding: 3rem;
      pointer-events: none;
    }

    .empty-state h2 {
      color: #ffffff;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    .empty-state.hidden {
      display: none;
    }

    .app-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      padding: 0 3rem 3rem;
      color: #6b7280;
      font-size: 0.85rem;
      margin-top: auto;
    }

    .app-footer span {
      font-weight: 500;
    }

    .creator-card {
      width: 250px;
      display: grid;
      grid-template-columns: 60px 1fr;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.02);
      transition: var(--transition);
    }

    .creator-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .creator-card img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
      background: #ffffff;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .creator-card .badge-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .creator-card .badge-info .tag {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent-indigo);
    }

    .creator-card .badge-info .author {
      color: #ffffff;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2;
      margin-top: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .app-shell {
        padding: 1.25rem 0.75rem;
      }

      .todo-app {
        min-height: auto;
        border-radius: 24px;
      }

      .app-header {
        padding: 2.5rem 2rem 1.5rem;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        padding: 0 2rem 1.5rem;
      }

      .task-form {
        grid-template-columns: 1fr;
        padding: 1.5rem 2rem;
        gap: 0.75rem;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
        padding: 1.5rem 2rem;
        gap: 1rem;
      }

      .filters {
        justify-content: center;
      }

      .filter-btn {
        flex: 1;
        text-align: center;
      }

      .ghost-btn {
        text-align: center;
        width: 100%;
      }

      .tasks-panel {
        margin: 0 2rem 2rem;
      }

      .app-footer {
        flex-direction: column-reverse;
        align-items: center;
        text-align: center;
        padding: 0 2rem 2.5rem;
        gap: 1.5rem;
      }

      .creator-card {
        width: 100%;
        max-width: 325px;
      }
    }

    @media (max-width: 540px) {
      .app-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .clock-pill {
        width: 100%;
        justify-content: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .task-item {
        grid-template-columns: auto 1fr;
        gap: 1rem;
      }

      .task-actions {
        grid-column: 2;
        justify-content: flex-start;
        margin-top: 0.25rem;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="todo-app" aria-label="Todo application">
      <header class="app-header">
        <div class="title-wrap">
          <div class="app-mark" aria-hidden="true"></div>
          <div>
            <h1>Todo App</h1>
            <p class="byline">clean and simple task manager</p>
          </div>
        </div>
        <time class="clock-pill" id="clockText"></time>
      </header>

      <section class="stats-grid" aria-label="Task summary">
        <article class="stat-card">
          <strong id="totalCount">0</strong>
          <span>Total tasks</span>
        </article>
        <article class="stat-card">
          <strong id="pendingCount">0</strong>
          <span>Pending tasks</span>
        </article>
        <article class="stat-card">
          <strong id="completedCount">0</strong>
          <span>Completed tasks</span>
        </article>
        <article class="stat-card">
          <strong id="dayText">Today</strong>
          <span>Current day</span>
        </article>
      </section>

      <form class="task-form" id="taskForm">
        <label class="sr-only" for="taskTitle">Task title</label>
        <input id="taskTitle" type="text" placeholder="What needs to be done?" autocomplete="off" maxlength="90" />

        <label class="sr-only" for="taskDate">Task date</label>
        <input id="taskDate" type="date" />

        <label class="sr-only" for="taskTime">Task time</label>
        <input id="taskTime" type="time" />

        <button type="submit" class="primary-btn">Add Task</button>
      </form>

      <div class="toolbar">
        <div class="filters" role="tablist" aria-label="Task filters">
          <button class="filter-btn active" type="button" data-filter="all" role="tab" aria-selected="true">All</button>
          <button class="filter-btn" type="button" data-filter="pending" role="tab" aria-selected="false">Pending</button>
          <button class="filter-btn" type="button" data-filter="completed" role="tab" aria-selected="false">Completed</button>
        </div>
        <button class="ghost-btn" id="clearCompleted" type="button">Clear completed</button>
      </div>

      <section class="tasks-panel" aria-live="polite">
        <ul class="task-list" id="taskList"></ul>
        <div class="empty-state" id="emptyState">
          <h2>No tasks assigned yet</h2>
          <p>Get started by adding your first milestone above.</p>
        </div>
      </section>

      <footer class="app-footer">
        <span>Tip: Press Enter to save. Double-click any task text to edit instantly.</span>

        <aside class="creator-card" aria-label="Creator badge">
          <img src="fe8e830a-9eab-46c1-8539-75ee9cbf71fd.png" alt="100xdevs logo" />
          <div class="badge-info">
            <span class="tag">100xdevs</span>
            <span class="author">Made by Swastik</span>
          </div>
        </aside>
      </footer>
    </section>
  </main>

  <script>
    const taskForm = document.querySelector("#taskForm");
    const taskTitle = document.querySelector("#taskTitle");
    const taskDate = document.querySelector("#taskDate");
    const taskTime = document.querySelector("#taskTime");
    const taskList = document.querySelector("#taskList");
    const emptyState = document.querySelector("#emptyState");
    const clearCompleted = document.querySelector("#clearCompleted");
    const filterButtons = document.querySelectorAll(".filter-btn");

    const totalCount = document.querySelector("#totalCount");
    const pendingCount = document.querySelector("#pendingCount");
    const completedCount = document.querySelector("#completedCount");
    const dayText = document.querySelector("#dayText");
    const clockText = document.querySelector("#clockText");

    let tasks = loadTasks();
    let activeFilter = "all";

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem("swastikTasks") || "[]");
      } catch {
        return [];
      }
    }

    function createId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function saveTasks() {
      localStorage.setItem("swastikTasks", JSON.stringify(tasks));
    }

    function formatDate(value) {
      if (!value) return "No date";
      const date = new Date(`${value}T00:00:00`);
      return date.toLocaleDateString(undefined, {
        weekday: "short",
        day: "2-digit",
        month: "short"
      });
    }

    function formatTime(value) {
      if (!value) return "No time";
      const [hours, minutes] = value.split(":");
      const date = new Date();
      date.setHours(Number(hours), Number(minutes), 0, 0);
      return date.toLocaleTimeString(undefined, {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function updateClock() {
      const now = new Date();
      clockText.textContent = now.toLocaleString(undefined, {
        weekday: "long",
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });

      dayText.textContent = now.toLocaleDateString(undefined, {
        weekday: "short",
        day: "2-digit",
        month: "short"
      });
    }

    function getVisibleTasks() {
      if (activeFilter === "pending") return tasks.filter((task) => !task.done);
      if (activeFilter === "completed") return tasks.filter((task) => task.done);
      return tasks;
    }

    function updateStats() {
      const completed = tasks.filter((task) => task.done).length;
      totalCount.textContent = tasks.length;
      pendingCount.textContent = tasks.length - completed;
      completedCount.textContent = completed;
    }

    function renderTasks() {
      const visibleTasks = getVisibleTasks();
      taskList.innerHTML = "";
      emptyState.classList.toggle("hidden", visibleTasks.length > 0);

      visibleTasks.forEach((task) => {
        const item = document.createElement("li");
        item.className = `task-item${task.done ? " done" : ""}`;
        item.dataset.id = task.id;

        const checkbox = document.createElement("input");
        checkbox.className = "task-check";
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.setAttribute("aria-label", `Mark ${task.title} complete`);

        const main = document.createElement("div");
        main.className = "task-main";

        const title = document.createElement("span");
        title.className = "task-title";
        title.textContent = task.title;
        title.title = "Double-click to edit";

        const meta = document.createElement("span");
        meta.className = "task-meta";
        meta.textContent = `${formatDate(task.date)} at ${formatTime(task.time)}`;

        const actions = document.createElement("div");
        actions.className = "task-actions";

        const editButton = document.createElement("button");
        editButton.className = "task-action edit";
        editButton.type = "button";
        editButton.title = "Edit task";
        editButton.setAttribute("aria-label", `Edit ${task.title}`);
        editButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" /></svg>`;

        const deleteButton = document.createElement("button");
        deleteButton.className = "task-action delete";
        deleteButton.type = "button";
        deleteButton.title = "Delete task";
        deleteButton.setAttribute("aria-label", `Delete ${task.title}`);
        deleteButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>`;

        main.append(title, meta);
        actions.append(editButton, deleteButton);
        item.append(checkbox, main, actions);
        taskList.append(item);
      });

      updateStats();
      saveTasks();
    }

    function addTask(event) {
      event.preventDefault();
      const title = taskTitle.value.trim();

      if (!title) {
        taskTitle.focus();
        return;
      }

      tasks.unshift({
        id: createId(),
        title,
        date: taskDate.value,
        time: taskTime.value,
        done: false
      });

      taskForm.reset();
      taskTitle.focus();
      renderTasks();
    }

    function editTask(id) {
      const task = tasks.find((item) => item.id === id);
      if (!task) return;

      const nextTitle = prompt("Edit task description:", task.title);
      if (!nextTitle || !nextTitle.trim()) return;

      task.title = nextTitle.trim();
      renderTasks();
    }

    taskForm.addEventListener("submit", addTask);

    taskList.addEventListener("click", (event) => {
      const item = event.target.closest(".task-item");
      if (!item) return;

      const id = item.dataset.id;
      const task = tasks.find((entry) => entry.id === id);
      if (!task) return;

      if (event.target.matches(".task-check")) {
        task.done = event.target.checked;
        renderTasks();
      }

      if (event.target.matches(".delete")) {
        tasks = tasks.filter((entry) => entry.id !== id);
        renderTasks();
      }

      if (event.target.matches(".edit")) {
        editTask(id);
      }
    });

    taskList.addEventListener("dblclick", (event) => {
      const item = event.target.closest(".task-item");
      if (!item || !event.target.matches(".task-title")) return;
      editTask(item.dataset.id);
    });

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;

        filterButtons.forEach((item) => {
          const isActive = item === button;
          item.classList.toggle("active", isActive);
          item.setAttribute("aria-selected", String(isActive));
        });

        renderTasks();
      });
    });

    clearCompleted.addEventListener("click", () => {
      tasks = tasks.filter((task) => !task.done);
      renderTasks();
    });

    updateClock();
    setInterval(updateClock, 30000);
    renderTasks();
  </script>
</body>
</html>
